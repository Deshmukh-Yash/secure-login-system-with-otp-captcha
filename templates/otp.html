<!DOCTYPE html>
<html>
<head>
    <title>OTP Verification</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 320px;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 15px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
            text-align: center;
            font-size: 18px;
            letter-spacing: 5px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #4facfe;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #00c6ff;
        }

        .info {
            font-size: 12px;
            color: #555;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>OTP Verification 🔐</h2>

    <form method="POST">
        <input type="text" name="otp" placeholder="Enter OTP" required>

        <button type="submit">Verify OTP</button>
    </form>

    <div class="info">
        Check your email for OTP 📧
    </div>
</div>

</body>
</html>
