<!DOCTYPE html>
<html>
<head>
    <title>Error</title>

    <style>
        body{
            background-color:#0f172a;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            font-family:Arial, sans-serif;
        }

        .error-box{
            background:white;
            padding:40px;
            border-radius:15px;
            text-align:center;
            width:350px;
            box-shadow:0px 0px 20px rgba(0,0,0,0.3);
        }

        h1{
            color:red;
            margin-bottom:15px;
        }

        p{
            font-size:18px;
            margin-bottom:25px;
        }

        a{
            text-decoration:none;
            background:#2563eb;
            color:white;
            padding:10px 20px;
            border-radius:8px;
        }

        a:hover{
            background:#1d4ed8;
        }
    </style>
</head>

<body>

    <div class="error-box">
        <h1>Access Denied ❌</h1>

        <p>{{ message }}</p>

        <a href="/login">Back to Login</a>
    </div>

</body>
</html>
