<!DOCTYPE html>
<html>
<head>
    <title>Registration Successful</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 350px;
            text-align: center;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.2);
        }

        h2 {
            color: #28a745;
        }

        p {
            color: #555;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: #4facfe;
            color: white;
            text-decoration: none;
            border-radius: 6px;
        }

        .btn:hover {
            background: #00c6ff;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>Registration Successful ✅</h2>
    <p>Your account has been created successfully.</p>

    <a href="/login" class="btn">Go to Login</a>
</div>

</body>
</html>
